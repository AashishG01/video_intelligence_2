###############################################
# MediaMTX configuration file
###############################################

# Set to yes or no to disable specific protocols
# We rely heavily on WebRTC
webrtc: yes
webrtcAddress: :8889
rtsp: yes
hls: no
rtmp: no

# Default paths
paths:
  # Camera 1 Setup
  cam1:
    source: rtsp://admin:admin@172.16.0.151:554/live.sdp
    sourceOnDemand: no

  # Camera 2 Setup
  cam2:
    source: rtsp://admin:admin@172.16.0.152:554/live.sdp
    sourceOnDemand: no

  # Camera 3 Setup
  cam3:
    source: rtsp://admin:123456@172.16.0.161:554/live.sdp
    sourceOnDemand: no

  # Camera 4 Setup
  cam4:
    source: rtsp://admin:Admin@123@172.16.0.162:554/live.sdp
    sourceOnDemand: no
